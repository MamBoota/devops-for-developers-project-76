---
- name: Validate database adapter
  ansible.builtin.assert:
    that:
      - redmine_db_adapter in ['postgresql', 'mysql']
    fail_msg: "redmine_db_adapter must be either 'postgresql' or 'mysql'"

- name: Install Docker and Python dependencies
  ansible.builtin.apt:
    name:
      - docker.io
      - python3-docker
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Create Redmine working directory
  ansible.builtin.file:
    path: /opt/redmine
    state: directory
    mode: "0755"

- name: Render Redmine environment file
  ansible.builtin.template:
    src: redmine.env.j2
    dest: /opt/redmine/.env
    mode: "0600"

- name: Start or update Redmine container
  community.docker.docker_container:
    name: "{{ redmine_container_name }}"
    image: "{{ redmine_image }}"
    pull: true
    restart_policy: "{{ redmine_restart_policy }}"
    env_file: /opt/redmine/.env
    published_ports:
      - "{{ redmine_host_port }}:{{ redmine_container_port }}"
    state: started

- name: Wait until Redmine port is reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ redmine_host_port }}"
    timeout: 60

- name: Check Redmine health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ redmine_host_port }}/"
    method: GET
    return_content: false
    status_code: [200, 301, 302]
  register: redmine_healthcheck
  retries: 10
  delay: 5
  until: redmine_healthcheck.status in [200, 301, 302]
